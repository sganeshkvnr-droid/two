name: Web App CI

on:
  push:
    branches:
      - feature-update

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Check Files
        run: |
          ls

          test -f index.html
          test -f style.css
          test -f script.js

          echo "All files found"

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true

          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: CI Success

          to: sganeshkvnr@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}

          body: |
            Feature branch push successful.
            CI validation passed.